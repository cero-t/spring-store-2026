spring.application.name=bff
server.port=9000

store.urls.item=http://localhost:9001
store.urls.stock=http://localhost:9002
store.urls.cart=http://localhost:9003
store.urls.order=http://localhost:9005

management.endpoints.web.exposure.include=*
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.service_name=${spring.application.name}

management.otlp.metrics.export.url=http://localhost:9009/otlp/v1/metrics

management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

management.opentelemetry.logging.export.otlp.endpoint=http://localhost:3100/otlp/v1/logs
management.opentelemetry.instrumentation.logback-appender.capture-experimental-attributes=true
management.opentelemetry.instrumentation.logback-appender.capture-key-value-pair-attributes=true
