spring.application.name=messaging
server.port=9010
spring.rabbitmq.host=127.0.0.1

#payment-service.order
store.messaging.destinations.order-process[0]=http://localhost:9004/order
#delivery-service
store.messaging.destinations.order-process[1]=http://localhost:9006

management.endpoints.web.exposure.include=*
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}

management.otlp.metrics.export.url=http://localhost:9009/otlp/v1/metrics

management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

management.opentelemetry.logging.export.otlp.endpoint=http://localhost:3100/otlp/v1/logs
management.opentelemetry.instrumentation.logback-appender.capture-experimental-attributes=true
management.opentelemetry.instrumentation.logback-appender.capture-key-value-pair-attributes=true
