spring.application.name=order-service
server.port=9005

store.urls.stock=http://localhost:9002
store.urls.cart=http://localhost:9003
store.urls.payment=http://localhost:9004
store.urls.order-process=http://localhost:9010/order-process

management.endpoints.web.exposure.include=*
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.service_name=${spring.application.name}

management.otlp.metrics.export.url=http://localhost:4318/v1/metrics

management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

management.opentelemetry.logging.export.otlp.endpoint=http://localhost:4318/v1/logs
management.opentelemetry.instrumentation.logback-appender.capture-experimental-attributes=true
management.opentelemetry.instrumentation.logback-appender.capture-key-value-pair-attributes=true
