services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"

  grafana:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
      - "4318:4318"
      - "4319:4319"

  webapp:
    image: node:24
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_STORE_BASE_URL: http://localhost:9000
    volumes:
      - ../../webapp:/app
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
